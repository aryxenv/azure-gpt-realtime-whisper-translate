name: gpt-realtime-whisper-translate
services:
  web:
    project: .
    dist: dist
    language: ts
    host: staticwebapp
    uses:
      - api
  api:
    project: ./server
    language: docker
    host: containerapp
    docker:
      path: Dockerfile
      remoteBuild: true
infra:
  provider: bicep
hooks:
  preprovision:
    windows:
      shell: pwsh
      run: ./scripts/azd/prepare-env.ps1
      interactive: false
    posix:
      shell: sh
      run: ./scripts/azd/prepare-env.sh
      interactive: false
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/azd/write-server-env.ps1
      interactive: false
    posix:
      shell: sh
      run: ./scripts/azd/write-server-env.sh
      interactive: false
